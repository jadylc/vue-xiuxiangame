name = "xiuxian-save"
main = "src/index.js"
compatibility_date = "2024-11-01"

# 把 KV 绑定到 Worker。在 Cloudflare 控制台或用 wrangler 创建 namespace：
#   wrangler kv namespace create XIUXIAN_SAVES
# 把返回的 id 填到下面。预览环境再创建一个并填 preview_id（可选）。
[[kv_namespaces]]
binding = "SAVES"
id = "bed50300b9564c07b742e4bdd932dbff"
# preview_id = "REPLACE_WITH_KV_PREVIEW_NAMESPACE_ID"
